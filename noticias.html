<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Noticias</title>

<style>
    body {
        margin: 0;
        font-family: 'IBM Plex Sans', sans-serif;
        background: #ffffff;
        color: #333;
        display: flex;
        height: 100vh;
    }

    .left-panel {
        flex: 2;
        padding: 40px;
        border-right: 1px solid #ddd;
        overflow-y: auto;
    }

    .back-arrow {
        display: inline-flex;
        align-items: center;
        color: #1A73B8;
        text-decoration: none;
        margin-bottom: 20px;
        cursor: pointer;
    }

    .arrow-icon {
        width: 28px;
        height: 28px;
        transition: transform 0.2s;
    }

    .back-arrow:hover .arrow-icon {
        transform: translateX(-3px);
    }

    h1 {
        margin-top: 0;
        font-size: 2rem;
        color: #1A73B8;
    }

    .right-panel {
        flex: 1;
        padding: 40px 30px;
        background: #f7f9fc;
        overflow-y: auto;
        border-left: 1px solid #ddd;
    }

    .submenu-item {
        padding: 12px 10px;
        margin-bottom: 10px;
        cursor: pointer;
        border-radius: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #ffffff;
        border: 1px solid #ddd;
        transition: background 0.2s, border-color 0.2s;
    }

    .submenu-item:hover {
        background: #eef5ff;
    }

    .submenu-item.active {
        background: #dceaff;
        border-color: #1A73B8;
        font-weight: 600;
    }

    .submenu-arrow {
        width: 18px;
        height: 18px;
        transition: transform 0.2s;
    }

    .submenu-item.active .submenu-arrow {
        transform: rotate(90deg);
    }

    .content-block {
        display: none;
    }

    .content-block.active {
        display: block;
    }

    /* Cuadrícula de noticias */
    .noticias-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 25px;
        margin-top: 25px;
    }

    .noticia-item {
        background: #fff;
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 6px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    .noticia-item h3 {
        margin: 0 0 8px 0;
        color: #1A73B8;
        font-size: 1.1rem;
    }

    .noticia-item p {
        margin: 0;
        font-size: 0.9rem;
        color: #555;
    }

    .btn-cargar {
        margin-top: 25px;
        padding: 12px 20px;
        background: #1A73B8;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
    }

    .btn-cargar:hover {
        background: #155d94;
    }

    /* ============================
       RESPONSIVE
       ============================ */

    @media (max-width: 1024px) {
        body {
            flex-direction: column;
            height: auto;
        }

        .left-panel,
        .right-panel {
            width: 100%;
            padding: 25px;
            border: none;
            overflow-y: visible;
        }

        .right-panel {
            background: #f7f9fc;
            border-top: 1px solid #ddd;
        }

        .noticias-grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 600px) {
        .left-panel,
        .right-panel {
            padding: 18px;
        }

        h1 {
            font-size: 1.6rem;
        }

        h2 {
            font-size: 1.3rem;
        }

        p {
            font-size: 1rem;
        }
    }
</style>
</head>

<body>

    <div class="left-panel">

        <a href="index.html" class="back-arrow">
            <svg viewBox="0 0 24 24" class="arrow-icon">
                <polyline points="15 6 9 12 15 18" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
        </a>

        <h1>Noticias</h1>

        <!-- Secciones -->
        <div id="content-ultimas" class="content-block active">
            <h2>Últimas Noticias</h2>
            <div id="gridUltimas" class="noticias-grid"></div>
            <button id="btnUltimas" class="btn-cargar">Cargar más</button>
        </div>

        <div id="content-memoriam" class="content-block">
            <h2>In Memoriam</h2>
            <div id="gridMemoriam" class="noticias-grid"></div>
            <button id="btnMemoriam" class="btn-cargar">Cargar más</button>
        </div>

        <div id="content-archivo" class="content-block">
            <h2>Archivo Histórico</h2>
            <div id="gridArchivo" class="noticias-grid"></div>
            <button id="btnArchivo" class="btn-cargar">Cargar más</button>
        </div>

        <div id="content-galeria" class="content-block">
            <h2>Galería Multimedia</h2>
            <div id="gridGaleria" class="noticias-grid"></div>
            <button id="btnGaleria" class="btn-cargar">Cargar más</button>
        </div>

    </div>

    <div class="right-panel">

        <div class="submenu-item active" data-target="content-ultimas">
            Últimas Noticias
            <svg class="submenu-arrow" viewBox="0 0 24 24">
                <polyline points="9 6 15 12 9 18" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
        </div>

        <div class="submenu-item" data-target="content-memoriam">
            In Memoriam
            <svg class="submenu-arrow" viewBox="0 0 24 24">
                <polyline points="9 6 15 12 9 18" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
        </div>

        <div class="submenu-item" data-target="content-archivo">
            Archivo Histórico
            <svg class="submenu-arrow" viewBox="0 0 24 24">
                <polyline points="9 6 15 12 9 18" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
        </div>

        <div class="submenu-item" data-target="content-galeria">
            Galería Multimedia
            <svg class="submenu-arrow" viewBox="0 0 24 24">
                <polyline points="9 6 15 12 9 18" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
        </div>

    </div>

<script>
/* ------------------------------
   SISTEMA DE SECCIONES
--------------------------------*/
const items = document.querySelectorAll('.submenu-item');
const blocks = document.querySelectorAll('.content-block');

function activarSeccion(targetId) {
    items.forEach(i => i.classList.remove('active'));
    blocks.forEach(b => b.classList.remove('active'));

    document.getElementById(targetId).classList.add('active');
    document.querySelector(`[data-target="${targetId}"]`).classList.add('active');
}

items.forEach(item => {
    item.addEventListener('click', () => activarSeccion(item.dataset.target));
});

/* ------------------------------
   PAGINADOR GENÉRICO
--------------------------------*/
class Paginador {
    constructor(items, renderFn, container, boton, tam = 6) {
        this.items = items;
        this.renderFn = renderFn;
        this.container = container;
        this.boton = boton;
        this.tam = tam;
        this.pagina = 0;

        this.boton.addEventListener("click", () => this.siguiente());
        this.mostrar();
    }

    mostrar() {
        this.container.innerHTML = "";
        const inicio = this.pagina * this.tam;
        const fin = inicio + this.tam;
        const bloque = this.items.slice(inicio, fin);

        bloque.forEach(item => {
            this.container.appendChild(this.renderFn(item));
        });

        this.boton.textContent = (fin >= this.items.length)
            ? "Volver al inicio"
            : "Cargar más";
    }

    siguiente() {
        this.pagina++;
        if (this.pagina * this.tam >= this.items.length) {
            this.pagina = 0;
        }
        this.mostrar();
    }
}

/* ------------------------------
   DATOS DE EJEMPLO
--------------------------------*/
const noticiasUltimas = [
    { titulo: "Asamblea General 2024", fecha: "12/05/2024" },
    { titulo: "Nueva actividad cultural", fecha: "03/05/2024" },
    { titulo: "Visita institucional", fecha: "28/04/2024" },
    { titulo: "Publicación del boletín 67", fecha: "20/04/2024" },
    { titulo: "Jornada deportiva AEIK", fecha: "15/04/2024" },
    { titulo: "Colaboración con entidades", fecha: "10/04/2024" },
    { titulo: "Premio a la innovación", fecha: "01/04/2024" }
];

const noticiasMemoriam = [
    { titulo: "Homenaje a Juan Pérez", fecha: "2023" },
    { titulo: "Recordando a María López", fecha: "2022" }
];

const noticiasArchivo = [
    { titulo: "Noticias 2015", fecha: "2015" },
    { titulo: "Noticias 2014", fecha: "2014" },
    { titulo: "Noticias 2013", fecha: "2013" }
];

const noticiasGaleria = [
    { titulo: "Fotos del evento 2024", fecha: "2024" },
    { titulo: "Vídeo de la jornada", fecha: "2024" }
];

/* ------------------------------
   RENDERIZADOR DE NOTICIAS
--------------------------------*/
function renderNoticia(item) {
    const div = document.createElement("div");
    div.className = "noticia-item";
    div.innerHTML = `
        <h3>${item.titulo}</h3>
        <p>${item.fecha}</p>
    `;
    return div;
}

/* ------------------------------
   ACTIVAR PAGINADORES
--------------------------------*/
new Paginador(noticiasUltimas, renderNoticia, gridUltimas, btnUltimas);
new Paginador(noticiasMemoriam, renderNoticia, gridMemoriam, btnMemoriam);
new Paginador(noticiasArchivo, renderNoticia, gridArchivo, btnArchivo);
new Paginador(noticiasGaleria, renderNoticia, gridGaleria, btnGaleria);

</script>

</body>
</html>
